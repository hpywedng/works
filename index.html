<script>
    // 1. GLightboxの初期化
    let lightbox = GLightbox({
        selector: '.glightbox'
    });

    // ==========================================================================
    // ギミック：手紙を【閉じた】瞬間に、でふぉるめの2枚目にいちご謎を完全に結合する
    // ==========================================================================
    let hasReadLetter = false; // フラグ管理用の変数

    // ライトボックスが「閉じた（close）」イベントを正確にキャッチ
    lightbox.on('close', () => {
        // 現在出現している隠し手紙のトリガー要素を取得
        const letterTrigger = document.getElementById('hidden-letter-trigger');
        
        // 手紙が画面上に出現（displayがnoneではない）しており、かつ、まだフラグが立っていない場合
        if (letterTrigger && letterTrigger.style.display !== 'none' && !hasReadLetter) {
            hasReadLetter = true; // フラグON
            
            // 隔離していた「いちご謎」のaタグを取得
            const nazoLink = document.getElementById('strawberry-nazo-link');
            if (nazoLink) {
                // クラス名とでふぉるめのギャラリー名を付与して結合！
                nazoLink.classList.add('glightbox');
                nazoLink.setAttribute('data-gallery', 'my-work-025');
                
                // ライトボックスが閉じている安全なタイミングで最新状態を再構築
                lightbox.reload();
            }
        }
    });

    // 2. IntersectionObserver (スクロールアニメーション用)
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                if (entry.target.classList.contains('section-title')) {
                    entry.target.classList.add('is-visible');
                } else {
                    entry.target.classList.add('is-active');
                    observer.unobserve(entry.target);
                }
            }
        });
    }, { threshold: 0.1 });

    const worksTitle = document.querySelector('.section-title');
    if (worksTitle) {
        observer.observe(worksTitle);
    }

    document.querySelectorAll('.deco-item').forEach(item => {
        observer.observe(item);
    });

    // ==========================================================================
    // 謎解きシステム：純粋な人力オーバーラップドラッグ
    // ==========================================================================
    const createQRPieces = () => {
        if (document.getElementById('qr-piece-left')) return;

        const leftPiece = document.createElement('img');
        leftPiece.id = 'qr-piece-left';
        leftPiece.className = 'qr-draggable-piece';
        leftPiece.src = 'images/deco/qr-left.png';
        
        const rightPiece = document.createElement('img');
        rightPiece.id = 'qr-piece-right';
        rightPiece.className = 'qr-draggable-piece';
        rightPiece.src = 'images/deco/qr-right.png';

        document.body.appendChild(leftPiece);
        document.body.appendChild(rightPiece);

        makeElementDraggable(leftPiece);
        makeElementDraggable(rightPiece);
    };

    const makeElementDraggable = (el) => {
        let offsetX = 0, offsetY = 0, mouseX = 0, mouseY = 0;

        const dragMouseDown = (e) => {
            e = e || window.event;
            
            if (e.touches && e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            } else {
                e.preventDefault();
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
            
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
            document.ontouchend = closeDragElement;
            document.ontouchmove = elementDrag;
        };

        const elementDrag = (e) => {
            e = e || window.event;
            const currentX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const currentY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            
            offsetX = mouseX - currentX;
            offsetY = mouseY - currentY;
            mouseX = currentX;
            mouseY = currentY;
            
            el.style.top = (el.offsetTop - offsetY) + "px";
            el.style.left = (el.offsetLeft - offsetX) + "px";
        };

        const closeDragElement = () => {
            document.onmouseup = null;
            document.onmousemove = null;
            document.ontouchend = null;
            document.ontouchmove = null;
        };

        el.onmousedown = dragMouseDown;
        el.ontouchstart = dragMouseDown;
    };

    let clickedPieces = { left: false, right: false };

    createQRPieces();

    document.querySelectorAll('.puzzle-trigger').forEach(trigger => {
        trigger.addEventListener('click', function(e) {
            const pieceSide = this.getAttribute('data-piece');
            const targetPiece = document.getElementById('qr-piece-' + pieceSide);
            const worksSection = document.querySelector('.works');

            const butterfly = document.createElement('div');
            butterfly.className = 'click-butterfly';
            butterfly.style.left = e.clientX + 'px';
            butterfly.style.top = e.clientY + 'px';
            
            if (pieceSide === 'right') {
                butterfly.style.transform = 'scaleX(-1)'; 
            }
            
            document.body.appendChild(butterfly);
            setTimeout(() => { butterfly.remove(); }, 1500);

            if (targetPiece && !clickedPieces[pieceSide]) {
                clickedPieces[pieceSide] = true;
                targetPiece.classList.add('spawned');

                if (clickedPieces.left && clickedPieces.right) {
                    worksSection.classList.remove('bg-step-crack');
                    worksSection.classList.add('bg-step-mono');
                } else {
                    worksSection.classList.add('bg-step-crack');
                }
            }
        });
    });

    // ==========================================================================
    // 上部検索窓のキーワード判定 ＋ 手紙＆トビラ出現ギミック
    // ==========================================================================
    document.getElementById('search-btn').addEventListener('click', () => {
        const input = document.getElementById('search-input').value.trim().toLowerCase();
        
        // 1. 手紙の判定
        const letterKeywords = ['手紙', 'てがみ', 'テガミ', 'tegami', 'letter'];
        // 2. トビラの判定
        const doorKeywords = ['トビラ', 'とびら', '扉'];

        if (letterKeywords.includes(input)) {
            alert('手紙が見つかりました…！');
            const letterTrigger = document.getElementById('hidden-letter-trigger');
            if (letterTrigger && letterTrigger.style.display === 'none') {
                letterTrigger.style.display = 'inline-block';
                lightbox.reload();
                letterTrigger.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        } 
        else if (doorKeywords.includes(input)) {
            alert('どこからか隠しトビラが現れた……');
            const doorArea = document.getElementById('hidden-door-area');
            doorArea.style.display = 'flex';
            setTimeout(() => { doorArea.style.opacity = '1'; }, 50);
            doorArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } 
        else if (input !== '') {
            alert('何も見つからなかった。キーワードが違うようだ…');
        }
    });

// ログインボタンのイベント判定
    document.getElementById('door-submit').addEventListener('click', () => {
        const input = document.getElementById('door-password').value.trim().toLowerCase();
        const correctKeys = ['鍵', 'カギ', 'かぎ', 'key'];

        if (correctKeys.includes(input)) {
            // 正解の場合：扉から少女が出てくる演出
            alert("……うん、そう。『鍵』であくの、、、。");
            const doorImg = document.getElementById('door-image'); // imgタグにこのIDを振ってください
            if (doorImg) {
                doorImg.src = "images/her/girl-coming-out.png"; // トビラが開く
            }

            // 2. ★追加：文章を切り替え！
        const doorMessage = document.getElementById('door-message');
        if (doorMessage) {
            doorMessage.textContent = "どこかにお礼の手紙が届いたようです。";

        }

        } else {
            // 不正解の場合
            alert(input + " では開かないの……");
        }
    });
