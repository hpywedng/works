<script>
window.addEventListener('load', () => {
    const textEl = document.getElementById('loading-text');
    if (!textEl) return;

    const originalText = "読み込み中…";
    const targetText = "HELPME";
    
    // 文字をspanに分解（初期クラス：jumping）
    textEl.innerHTML = originalText.split('').map(c => `<span class="jumping">${c}</span>`).join('');
    
    const spans = textEl.querySelectorAll('span');
    spans.forEach((span, i) => {
        span.style.animationDelay = `${i * 0.15}s`;
    });

    // 2.5秒後に蝶を生成
 // 2.5秒（2500ms）を 1.8秒（1800ms）に変更
    setTimeout(() => {
        const wrapper = document.createElement('div');
        wrapper.className = 'butterfly-wrapper';
        const butterfly = document.createElement('div');
        butterfly.className = 'butterfly-image';
        wrapper.appendChild(butterfly);
        
        const screen = document.getElementById('loading-screen');
        screen.appendChild(wrapper); 
        
        const rect = textEl.getBoundingClientRect();
        const screenRect = screen.getBoundingClientRect();
        
        wrapper.style.position = 'absolute';
        wrapper.style.top = `${rect.top - screenRect.top}px`;
        wrapper.style.left = `${rect.left}px`; 
        wrapper.style.width = '80px';
        wrapper.style.height = '80px';
        wrapper.style.animation = 'butterfly-fly 4.8s ease-in-out forwards';

        // 文字変換のタイミングは蝶の出現から0.8秒後という相対的な関係なので、
        // ここの数値はそのままで大丈夫です！
        setTimeout(() => {
            const newChars = targetText.split('');
            spans.forEach((span, i) => {
                span.textContent = newChars[i] || '';
                span.classList.add('jumping');
            });
        }, 3000);
    }, 1800); // ここを1800に変更しました

    // 終了処理（7.3秒後）
    setTimeout(() => {
        const screen = document.getElementById('loading-screen');
        if (screen) {
            screen.style.opacity = '0';
            setTimeout(() => screen.remove(), 1000);
        }
    }, 7300);
});

    // ==========================================================================
    // 進行管理用のフラグ
    // ==========================================================================
    let hasReadLetter = false; 

    // トロフィーを表示する関数
    function addTrophy(imagePath) {
        const trophyCase = document.getElementById('trophy-case');
        if (trophyCase && !document.querySelector(`img[src="${imagePath}"]`)) {
            const img = document.createElement('img');
            img.src = imagePath;
            img.style.height = '25px';
            img.style.width = 'auto';
            img.style.animation = 'trophyAppear 0.5s ease-out';
            trophyCase.appendChild(img);
        }
    }

    // トロフィー出現アニメーションの定義
    const style = document.createElement('style');
    style.textContent = `
        @keyframes trophyAppear {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
    `;
    document.head.appendChild(style);

    // ==========================================================================
    // 高さを計算して適用する関数（セクションごとに余白調整可能版）
    // ==========================================================================
    function setSectionHeights() {
        // 引数に余白(margin)を追加しました
        const updateHeight = (markerId, sectionClass, margin) => {
            const marker = document.getElementById(markerId);
            const section = document.querySelector(sectionClass);
            if (marker && section) {
                const height = marker.offsetTop + marker.offsetHeight + margin;
                section.style.height = height + 'px';
            }
        };

        // heroは70、worksは150と個別に指定します
        updateHeight('hero-end-marker', '.hero', 70);
        updateHeight('works-end-marker', '.works', 190);
    }

    // 読み込み時とリサイズ時に実行
    window.addEventListener('load', setSectionHeights);
    window.addEventListener('resize', setSectionHeights);

    // 1. GLightboxの初期化
    let lightbox = GLightbox({ selector: '.glightbox' });

    // ==========================================================================
    // ギミック：各種モーダルを【閉じた】瞬間の判定
    // ==========================================================================
    lightbox.on('close', () => {
        // --- 1. 最初の手紙（蝶の手紙）を閉じたときの処理 ---
        const letterTrigger = document.getElementById('hidden-letter-trigger');
        if (letterTrigger && letterTrigger.style.display !== 'none' && !hasReadLetter) {
            hasReadLetter = true;
            
            const nazoLink = document.getElementById('strawberry-nazo-link');
            if (nazoLink) {
                nazoLink.classList.add('glightbox');
                nazoLink.setAttribute('data-gallery', 'my-work-025');
                lightbox.reload();
            }

            const targetThumbLink = document.querySelector('a[href="images/works/025.png"]');
            if (targetThumbLink) {
                const strawberry = document.createElement('img');
                strawberry.src = 'images/thumbnail/025-starwberry.png';
                strawberry.className = 'floating-strawberry';
                targetThumbLink.appendChild(strawberry);
            }

            // 【条件反映】手紙開封時に「サーチ」に変更
            document.getElementById('search-btn').textContent = 'サーチ';
        }

        // --- 2. 最後のお礼の手紙を閉じたときに「プレゼント袋」を表示 ---
        const finalLetterTrigger = document.getElementById('final-letter-trigger');
        if (finalLetterTrigger) {
            // 現在開いているスライドの情報を取得して「お礼の手紙」が閉じられたか判定
            const activeSlide = lightbox.getActiveSlide();
            const slideImg = activeSlide ? activeSlide.querySelector('img') : null;
            
            // お礼の手紙の画像パスが含まれていたらプレゼントを表示
            if (slideImg && slideImg.src.includes('cherry-letters.png')) {
                const presentContainer = document.getElementById('final-present-container');
                if (presentContainer && presentContainer.style.display === 'none') {
                    presentContainer.style.display = 'block';
                    // プレゼント表示を反映するために再読み込み
                    lightbox.reload();
                }
            }
        }
    });

    // 2. IntersectionObserver (スクロールアニメーション用)
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                if (entry.target.classList.contains('section-title')) {
                    entry.target.classList.add('is-visible');
                } else {
                    entry.target.classList.add('is-active');
                    observer.unobserve(entry.target);
                }
            }
        });
    }, { threshold: 0.1 });

    const worksTitle = document.querySelector('.section-title');
    if (worksTitle) observer.observe(worksTitle);
    document.querySelectorAll('.deco-item').forEach(item => observer.observe(item));

    // ==========================================================================
    // 謎解きシステム：人力ドラッグ
    // ==========================================================================
    const createQRPieces = () => {
        if (document.getElementById('qr-piece-left')) return;
        ['left', 'right'].forEach(side => {
            const piece = document.createElement('img');
            piece.id = 'qr-piece-' + side;
            piece.className = 'qr-draggable-piece';
            piece.src = 'images/deco/qr-' + side + '.png';
            document.body.appendChild(piece);
            makeElementDraggable(piece);
        });
    };

    const makeElementDraggable = (el) => {
        let mouseX = 0, mouseY = 0;
        el.onmousedown = el.ontouchstart = (e) => {
            e.preventDefault();
            mouseX = e.touches ? e.touches[0].clientX : e.clientX;
            mouseY = e.touches ? e.touches[0].clientY : e.clientY;
            document.onmousemove = document.ontouchmove = (e) => {
                const curX = e.touches ? e.touches[0].clientX : e.clientX;
                const curY = e.touches ? e.touches[0].clientY : e.clientY;
                el.style.top = (el.offsetTop - (mouseY - curY)) + "px";
                el.style.left = (el.offsetLeft - (mouseX - curX)) + "px";
                mouseX = curX; mouseY = curY;
            };
            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = document.onmouseup = document.ontouchend = null;
            };
        };
    };

    let clickedPieces = { left: false, right: false };
    createQRPieces();

    document.querySelectorAll('.puzzle-trigger').forEach(trigger => {
        trigger.addEventListener('click', function(e) {
            const side = this.getAttribute('data-piece');
            clickedPieces[side] = true;
            document.getElementById('qr-piece-' + side).classList.add('spawned');
            
            const worksSection = document.querySelector('.works');
            if (clickedPieces.left && clickedPieces.right) {
                worksSection.classList.remove('bg-step-crack');
                worksSection.classList.add('bg-step-mono');
                // 【条件反映】QR合体で「探す」に変更
                document.getElementById('search-btn').textContent = '探す';
            } else {
                worksSection.classList.add('bg-step-crack');
            }
        });
    });

    // ==========================================================================
    // 上部検索窓 ＋ ギミック出現 ＋ トロフィー・ボタン変更
    // ==========================================================================
    document.getElementById('search-btn').addEventListener('click', () => {
        const input = document.getElementById('search-input').value.trim().toLowerCase();
        const letterKeywords = ['手紙', 'てがみ', 'テガミ', 'tegami', 'letter'];
        const doorKeywords = ['トビラ', 'とびら', '扉', 'tobira'];

        if (letterKeywords.includes(input)) {
            alert('手紙が見つかりました…！');
            const letterTrigger = document.getElementById('hidden-letter-trigger');
            if (letterTrigger && letterTrigger.style.display === 'none') {
                letterTrigger.style.display = 'inline-block';
                lightbox.reload();
                letterTrigger.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                addTrophy('images/icon/01batterfly.png');
            }
        } 
        else if (doorKeywords.includes(input)) {
            alert('どこからか隠しトビラが現れた……');
            const doorArea = document.getElementById('hidden-door-area');
            doorArea.style.display = 'flex';
            setTimeout(() => { doorArea.style.opacity = '1'; }, 50);
            doorArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            // 【条件反映】トビラ出現でいちごトロフィー追加 ＋ 言葉を「検索」に戻す
            addTrophy('images/icon/02starwberry.png');
            document.getElementById('search-btn').textContent = '検索';
        } 
        else if (input !== '') {
            alert('何も見つからなかった。キーワードが違うようだ…');
        }
    });

        // ...（既存のパズル処理：if (targetPiece && !clickedPieces[pieceSide]) ...）
    });

// そして、蝶を生成する関数本体をスクリプト内のどこかに定義しておきます
function showButterfly(x, y) {
    const butterfly = document.createElement('div');
    butterfly.className = 'click-butterfly';
    butterfly.style.left = x + 'px';
    butterfly.style.top = y + 'px';
    document.body.appendChild(butterfly);
    
    // 1.5秒後に自動削除
    setTimeout(() => {
        butterfly.remove();
    }, 1500);
}

    const activeSlide = lightbox.getActiveSlide();
    const slideImg = activeSlide ? activeSlide.querySelector('img') : null;
    
    // 既に04トロフィーがないか確認してから追加
    if (slideImg && slideImg.src.includes('ito_tooshi.png')) {
        addTrophy('images/icon/04itotosi.png'); // ファイルパスを調整してください
    }
});
